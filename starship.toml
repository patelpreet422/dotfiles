# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

[line_break]
disabled = true

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

# ---- Nerd Font Symbols preset (`starship preset nerd-font-symbols`) ----
# Uses width-1 Nerd Font icons instead of emoji, so the prompt has no
# ambiguous-width emoji. This removes the duplicated-character typing bug
# at the source (no changes needed in zsh or Ghostty).
